spring:
  application:
    name: employee-onboarding-portal
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=onboarding_portal;encrypt=true;trustServerCertificate=true}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:changeIt_123!}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      minimum-idle: 2
      maximum-pool-size: ${DB_POOL_MAX:10}
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-signing-key-to-a-long-random-value-min-256-bits}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
      issuer: employee-onboarding-portal
    # /api/v1/auth/register is admin-only, so this is how the very first admin account gets
    # created. Disabled by default; dev/local turn it on with known throwaway credentials.
    bootstrap-admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
      username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
      email: ${BOOTSTRAP_ADMIN_EMAIL:admin@example.com}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:changeMe_On_First_Run!}
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      auto-create-buckets: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.enterprise.onboarding: DEBUG
