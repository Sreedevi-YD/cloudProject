# On-premises production defaults. All secrets are expected to arrive via environment
# variables injected from Kubernetes Secrets (see k8s/base/secret.yaml) — nothing is hardcoded here.
spring:
  jpa:
    show-sql: false

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    root: WARN
    com.enterprise.onboarding: INFO
