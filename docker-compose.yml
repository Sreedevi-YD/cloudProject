name: employee-onboarding-portal

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: onboarding-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-changeIt_123!}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-init:
    image: mcr.microsoft.com/mssql-tools18
    container_name: onboarding-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./docker/sqlserver/init-db.sql:/init-db.sql:ro
    entrypoint: ["/opt/mssql-tools18/bin/sqlcmd", "-C", "-S", "sqlserver", "-U", "sa",
                 "-P", "${DB_PASSWORD:-changeIt_123!}", "-i", "/init-db.sql"]

  minio:
    image: minio/minio:latest
    container_name: onboarding-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onboarding-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: sqlserver
      DB_PORT: "1433"
      DB_NAME: onboarding_portal
      DB_USERNAME: sa
      DB_PASSWORD: ${DB_PASSWORD:-changeIt_123!}
      MINIO_HOST: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-change-this-signing-key-to-a-long-random-value-min-256-bits}
      # Bootstraps one admin account on first run so the API/UI are usable immediately.
      # Change the password (or disable this) once you've created your real admin accounts.
      BOOTSTRAP_ADMIN_ENABLED: "true"
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-Admin@12345}
    ports:
      - "8080:8080"
    depends_on:
      db-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

volumes:
  sqlserver-data:
  minio-data:
